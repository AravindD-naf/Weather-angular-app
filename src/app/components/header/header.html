<header style="background:#0f172a; color:#fff; padding:1rem;">
  <div style="max-width:720px; margin:0 auto; display:flex; justify-content:space-between; align-items:center;">
    <h1 style="margin:0; font-size:1.25rem;">Open‑Meteo Weather</h1>
    <div>
      <strong>Last Searched:</strong>
      <span *ngIf="(selectedCity$ | async) as c; else none">
        {{ c.name }}<span *ngIf="c.admin1">, {{ c.admin1 }}</span><span *ngIf="c.country">, {{ c.country }}</span>
      </span>
      <ng-template #none>—</ng-template>
    </div>
  </div>
</header>
